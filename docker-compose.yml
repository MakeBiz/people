services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # БД наружу не публикуется — доступ только из docker-сети (раздел 10 ТЗ)

  # Одноразовая инициализация схемы и сид тестов/владельца
  migrate:
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
    command: ["npm", "-w", "@hr/db", "run", "init"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OWNER_EMAIL: ${OWNER_EMAIL}
      OWNER_PASSWORD: ${OWNER_PASSWORD}
      CONTENT_DIR: /app/content
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  bot:
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_USERNAME: ${BOT_USERNAME}
      BOT_MODE: ${BOT_MODE}
      BOT_WEBHOOK_URL: ${BOT_WEBHOOK_URL}
      BOT_WEBHOOK_SECRET: ${BOT_WEBHOOK_SECRET}
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  admin:
    build:
      context: .
      dockerfile: packages/admin/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      BOT_USERNAME: ${BOT_USERNAME}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
      BOT_DOMAIN: ${BOT_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - admin
      - bot

volumes:
  pgdata:
  caddy_data:
  caddy_config:
